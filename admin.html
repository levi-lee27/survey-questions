<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>统计后台 - 评审满意度调查</title>
  <link rel="stylesheet" href="admin-styles.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <a href="index.html" class="back-link">← 返回问卷</a>
      <h1>📊 统计后台</h1>
      <p class="subtitle">问卷数据实时统计</p>
    </header>

    <!-- 统计卡片 -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">📝</div>
        <div class="stat-value" id="totalCount">0</div>
        <div class="stat-label">总提交数</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📈</div>
        <div class="stat-value" id="averageScore">0.00</div>
        <div class="stat-label">平均分</div>
      </div>
      <div class="stat-card highlight">
        <div class="stat-icon">🏆</div>
        <div class="stat-value" id="maxScore">0.00</div>
        <div class="stat-label">最高分</div>
      </div>
    </div>

    <!-- 各题平均分 -->
    <div class="section-card">
      <h2 class="section-title">📋 各题平均分</h2>
      <div class="question-stats" id="questionStats">
        <!-- 动态生成 -->
      </div>
    </div>

    <!-- 提交记录 -->
    <div class="section-card">
      <div class="section-header">
        <h2 class="section-title">📜 提交记录 <span id="recordCount">(0)</span></h2>
        <button class="export-btn" onclick="exportCSV()">📥 导出 CSV</button>
      </div>

      <div class="filter-bar">
        <input type="text" id="searchInput" class="search-input" placeholder="搜索建议内容...">
        <select id="sortSelect" class="sort-select">
          <option value="time-desc">时间 ↓</option>
          <option value="time-asc">时间 ↑</option>
          <option value="score-desc">分数 ↓</option>
          <option value="score-asc">分数 ↑</option>
        </select>
      </div>

      <div class="records-list" id="recordsList">
        <!-- 动态生成 -->
      </div>

      <div class="pagination" id="pagination" style="display: none;">
        <!-- 动态生成 -->
      </div>
    </div>

    <!-- 操作按钮 -->
    <div class="actions">
      <button class="action-btn danger" onclick="clearAllData()">🗑️ 清空所有数据</button>
      <button class="action-btn primary" onclick="exportCSV()">💾 导出数据</button>
    </div>

    <footer class="footer">
      <p>Powered by OpenClaw | 数据存储在本地</p>
    </footer>
  </div>

  <!-- 确认模态框 -->
  <div id="confirmModal" class="modal">
    <div class="modal-content">
      <div class="modal-icon">⚠️</div>
      <h2 id="modalTitle">确认操作</h2>
      <p id="modalMessage">确定要执行此操作吗？</p>
      <div class="modal-actions">
        <button class="modal-btn cancel" onclick="closeModal()">取消</button>
        <button class="modal-btn confirm" id="modalConfirm">确定</button>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
